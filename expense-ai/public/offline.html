<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SplitKaro — You're offline</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Inter, ui-sans-serif, system-ui, sans-serif;
      background: #F8FAFC;
      color: #1f2937;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: #fff;
      border: 1px solid rgba(0,0,0,.08);
      border-radius: 2rem;
      padding: 40px 32px;
      max-width: 360px;
      width: 100%;
      text-align: center;
      box-shadow: 0 4px 24px rgba(0,0,0,.06);
    }
    .icon {
      width: 64px;
      height: 64px;
      border-radius: 1.25rem;
      background: #dcfce7;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
    }
    .icon svg { width: 32px; height: 32px; color: #16a34a; }
    h1 { font-size: 1.25rem; font-weight: 900; margin-bottom: 8px; }
    p  { font-size: .875rem; color: #6b7280; line-height: 1.5; margin-bottom: 28px; }
    button {
      background: #16a34a;
      color: #fff;
      border: none;
      border-radius: 1rem;
      padding: 14px 28px;
      font-size: .875rem;
      font-weight: 700;
      cursor: pointer;
      width: 100%;
      transition: opacity .15s;
    }
    button:hover { opacity: .9; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M18.364 5.636a9 9 0 1 1-12.728 0M12 3v9" />
      </svg>
    </div>
    <h1>You're offline</h1>
    <p>SplitKaro needs a connection to load your expenses and groups. Check your network and try again.</p>
    <button onclick="location.reload()">Try again</button>
  </div>
</body>
</html>
